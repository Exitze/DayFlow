name: Dayflow
options:
  bundleIdPrefix: com.dayflow
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
targets:
  Dayflow:
    type: application
    platform: iOS
    sources:
      - Dayflow
    info:
      path: Dayflow/Info.plist
      properties:
        CFBundleDisplayName: Dayflow
        UIAppFonts:
          - Unbounded-Black.ttf
          - Unbounded-SemiBold.ttf
          - Manrope-Regular.ttf
          - Manrope-Bold.ttf
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dayflow.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
