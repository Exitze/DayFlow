name: Dayflow
options:
  bundleIdPrefix: com.exitze
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: JB6349HSHY
targets:
  Dayflow:
    type: application
    platform: iOS
    sources:
      - Dayflow
    dependencies:
      - target: DayflowWidgetExtension
        embed: true
    info:
      path: Dayflow/Info.plist
      properties:
        CFBundleDisplayName: Dayflow
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - Unbounded-Black.ttf
          - Unbounded-SemiBold.ttf
          - Manrope-Regular.ttf
          - Manrope-Bold.ttf
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.exitze.dayflow
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Dayflow/Dayflow.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: JB6349HSHY
        TARGETED_DEVICE_FAMILY: "1"

  DayflowWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - DayflowWidget
      - path: Dayflow/DayActivityModel.swift
      - path: Dayflow/DayPlanStore.swift
      - path: Dayflow/DayflowWidgetSnapshot.swift
    resources:
      - Dayflow/Fonts
    info:
      path: DayflowWidget/Info.plist
      properties:
        CFBundleDisplayName: Dayflow
        CFBundlePackageType: XPC!
        UIAppFonts:
          - Unbounded-Black.ttf
          - Unbounded-SemiBold.ttf
          - Manrope-Regular.ttf
          - Manrope-Bold.ttf
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.exitze.dayflow.widget
        PRODUCT_NAME: DayflowWidgetExtension
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_ENTITLEMENTS: DayflowWidget/DayflowWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: JB6349HSHY
        TARGETED_DEVICE_FAMILY: "1"
